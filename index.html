    #nav .nav-item span {

    /* View Transition Animations - Telegram Style Reveal */
    ::view-transition-group(root) {
      animation-duration: 0.7s;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
      display: block;
    }

    ::view-transition-new(root) {
      z-index: 9999;
      clip-path: circle(0% at var(--x, 50%) var(--y, 50%));

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    (function() {
      const tip = document.getElementById("sidebar-tooltip");
      const arrow = document.getElementById("sidebar-tooltip-arrow");
      let hideTimer;
      document.addEventListener("mouseover", function(e) {
        const el = e.target.closest("[data-tooltip]");
        const sidebar = document.getElementById("sidebar");
        if (!el || !sidebar || !sidebar.classList.contains("sidebar-collapsed")) return;
        clearTimeout(hideTimer);
        const rect = el.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        tip.textContent = el.dataset.tooltip;
        requestAnimationFrame(function() {
          tip.style.top = (midY - tip.offsetHeight / 2) + "px";
          arrow.style.top = (midY - 4) + "px";
          tip.classList.add("visible");
          arrow.classList.add("visible");
        });
      });
      document.addEventListener("mouseout", function(e) {
        const el = e.target.closest("[data-tooltip]");
        if (!el) return;
        hideTimer = setTimeout(function() {
          tip.classList.remove("visible");
          arrow.classList.remove("visible");
        }, 80);
      });
    })();
  </script>
